name: Build

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  ceedling-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Ceedling
        run: gem install ceedling

      - name: Run unit tests (Ceedling)
        run: ceedling test:all
        
