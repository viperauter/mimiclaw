:project:
  :name: mimiclaw
  :build_root: build/ceedling
  :use_exceptions: FALSE
  :use_test_preprocessor: :none
  :use_auxiliary_dependencies: TRUE
  :use_deep_dependencies: TRUE
  :test_file_prefix: test_
  :default_tasks:
    - test:all

:paths:
  :test:
    - +:test/**
  :source:
    - main
    - main/core
    - main/core/platform
    - main/core/config
    - main/core/platform/fs
    - main/core/platform/fs/posix_impl
    - main/agent
    - main/agent/tools
    - main/memory
    - third_party
    - third_party/cjson
  :include:
    - main
    - main/agent
    - main/agent/tools
    - main/core
    - main/core/config
    - main/core/platform
    - main/memory
    - main/core/platform/os
    - main/services
    - third_party
    - third_party/cjson
    - test/test_support

:files:
  :test:
    - +:test/**
  :source:
    - main/agent/context/context_budget_plan.c
    - main/agent/context/context_compact.c
    - main/agent/context/context_assembler.c
    - main/agent/tools/tool_files.c
    - main/agent/tools/tool_cron.c
    - main/agent/tools/tool_get_time.c
    - main/agent/tools/tool_web_search.c
    - main/agent/tools/tool_exec.c
    - main/agent/tools/tool_registry.c
  :support:
    # Common support files for all tests
    - third_party/cjson/cJSON.c
    - main/core/platform/mimi_err.c
    - main/core/platform/log.c
    - main/core/platform/path_utils.c
    - main/core/platform/fs/fs.c
    - main/core/platform/fs/posix_impl/fs_posix.c
    - main/core/platform/exec.c

:defines:
  :common: &common_defines []
  :test:
    - *common_defines
    - TEST
    - MIMI_ENABLE_SUBAGENT=0

:tools_test_compiler:
  :arguments:
    - -std=c11
    - -Wall
    - -Wextra
    - -O0
    - -D_POSIX_C_SOURCE=200809L
    - -D_GNU_SOURCE

:libraries:
  :placement: :end
  :flag: "-l${1}"
  :path_flag: "-L ${1}"
  :system:
    - m
    - pthread
    - util
  :test: []
  :release: []

:plugins:
  :enabled:
    - fff
    - report_tests_gtestlike_stdout

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :when_ptr: :compare_ptr
  :treat_as_void:
    - mimi_cond_t
    - mimi_mutex_t
    - mimi_task_handle_t
    - mimi_timer_handle_t
  :plugins:
    - callback
    - return_thru_ptr
    - array